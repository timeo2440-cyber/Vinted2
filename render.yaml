services:
  - type: web
    name: vinted-autobot
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////opt/render/project/src/data/vinted_bot.db
      - key: FRONTEND_DIR
        value: /opt/render/project/src/frontend
      - key: PORT
        generateValue: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
