services:
  - type: web
    name: flashcop
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter        # 7$/mois — toujours actif, ne s'éteint jamais
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////app/data/flashcop.db
      - key: FRONTEND_DIR
        value: /app/frontend
      - key: SECRET_KEY
        generateValue: true   # Render génère une clé sécurisée automatiquement
      - key: ADMIN_EMAIL
        value: admin@flashcop.com
      - key: ADMIN_PASSWORD
        generateValue: true
    disk:
      name: flashcop-data
      mountPath: /app/data
      sizeGB: 5
