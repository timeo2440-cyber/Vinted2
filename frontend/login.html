<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — VintedBot</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .box{background:#1a1d27;border:1px solid #2a2d3e;border-radius:16px;padding:40px;width:100%;max-width:400px}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px;color:#fff;font-size:22px;font-weight:700}
    .logo svg{color:#6c63ff}
    label{display:block;color:#9ca3af;font-size:13px;margin-bottom:6px;margin-top:16px}
    input{width:100%;padding:12px 14px;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;color:#fff;font-size:15px;outline:none}
    input:focus{border-color:#6c63ff}
    button{width:100%;margin-top:24px;padding:13px;background:#6c63ff;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
    button:hover{background:#5a52e0}
    .error{color:#f87171;font-size:13px;margin-top:12px;text-align:center;min-height:20px}
    .footer{text-align:center;margin-top:20px;color:#6b7280;font-size:13px}
    .footer a{color:#6c63ff;text-decoration:none}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
    Vinted<span style="font-weight:400">Bot</span>
  </div>

  <label>Email</label>
  <input type="email" id="email" placeholder="votre@email.com" autocomplete="email"/>

  <label>Mot de passe</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>

  <div class="error" id="err"></div>
  <button id="btn" onclick="login()">Se connecter</button>

  <div class="footer" style="margin-top:28px">
    Pas encore de compte ? <a href="/login.html#register" onclick="showRegister()">Créer un compte</a>
  </div>

  <!-- Register section (hidden by default) -->
  <div id="register-section" style="display:none;margin-top:24px;border-top:1px solid #2a2d3e;padding-top:24px">
    <label>Email</label>
    <input type="email" id="reg-email" placeholder="votre@email.com"/>
    <label>Mot de passe (min. 6 caractères)</label>
    <input type="password" id="reg-password" placeholder="••••••••"/>
    <div class="error" id="reg-err"></div>
    <button onclick="register()" style="background:#10b981">Créer mon compte</button>
    <div class="footer"><a href="#" onclick="hideRegister()">← Retour connexion</a></div>
  </div>
</div>

<script>
function showRegister(){
  document.getElementById('register-section').style.display='block';
  document.getElementById('btn').style.display='none';
  document.querySelector('.footer').style.display='none';
  return false;
}
function hideRegister(){
  document.getElementById('register-section').style.display='none';
  document.getElementById('btn').style.display='block';
  document.querySelector('.footer').style.display='block';
  return false;
}
async function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const errEl=document.getElementById('err');
  const btn=document.getElementById('btn');
  errEl.textContent='';
  btn.textContent='Connexion…';
  btn.disabled=true;
  try{
    const r=await fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const text=await r.text();
    let data;
    try{data=JSON.parse(text);}catch{data={detail:text};}
    if(!r.ok){errEl.textContent=data.detail||'Erreur connexion';return;}
    localStorage.setItem('vbot_token',data.token);
    localStorage.setItem('vbot_user',JSON.stringify(data.user));
    window.location.href='/';
  }catch(e){
    errEl.textContent='Impossible de joindre le serveur : '+e.message;
  }finally{
    btn.textContent='Se connecter';
    btn.disabled=false;
  }
}
async function register(){
  const email=document.getElementById('reg-email').value.trim();
  const password=document.getElementById('reg-password').value;
  const errEl=document.getElementById('reg-err');
  errEl.textContent='';
  try{
    const r=await fetch('/api/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const text=await r.text();
    let data;
    try{data=JSON.parse(text);}catch{data={detail:text};}
    if(!r.ok){errEl.textContent=data.detail||'Erreur inscription';return;}
    localStorage.setItem('vbot_token',data.token);
    localStorage.setItem('vbot_user',JSON.stringify(data.user));
    window.location.href='/';
  }catch(e){
    errEl.textContent='Erreur : '+e.message;
  }
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('btn').click();
});
</script>
</body>
</html>
