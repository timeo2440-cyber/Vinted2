<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Créer un compte — VintedBot</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080910;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px}
    .container{width:100%;max-width:460px}
    .logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:900;color:#fff;justify-content:center;margin-bottom:32px}
    .logo span{color:#6c63ff}
    .box{background:#0f1119;border:1px solid #1a1d2e;border-radius:20px;padding:36px}
    h1{font-size:24px;font-weight:800;color:#e2e8f0;margin-bottom:6px}
    .sub{color:#64748b;font-size:14px;margin-bottom:28px}
    .plan-banner{border-radius:10px;padding:12px 16px;font-size:14px;font-weight:600;margin-bottom:22px;display:none}
    label{display:block;color:#9ca3af;font-size:13px;margin-bottom:5px;margin-top:14px}
    input{width:100%;padding:11px 14px;background:#080910;border:1px solid #1a1d2e;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none;transition:.15s}
    input:focus{border-color:#6c63ff}
    .key-note{font-size:12px;color:#64748b;margin-top:5px}
    .error{color:#f87171;font-size:13px;margin-top:10px;text-align:center;min-height:18px}
    button{width:100%;margin-top:20px;padding:13px;background:#6c63ff;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
    button:hover{background:#5750e3}
    button:disabled{opacity:.5;cursor:not-allowed}
    .footer-link{text-align:center;margin-top:16px;font-size:13px;color:#64748b}
    .footer-link a{color:#6c63ff}
    .no-key-msg{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:14px 16px;font-size:13px;color:#fbbf24;margin-bottom:20px;display:none}
  </style>
</head>
<body>
<div class="container">
  <div class="logo">⚡ <span>Vinted</span>Bot</div>
  <div class="box">
    <h1>Créer mon compte</h1>
    <p class="sub">Entre ta clé d'activation reçue après paiement</p>

    <div class="no-key-msg" id="no-key-msg">
      ⚠️ Tu n'as pas encore de clé d'activation.<br>
      <a href="/#tarifs" style="color:#f59e0b">Choisis un abonnement</a> pour en obtenir une.
    </div>

    <div class="plan-banner" id="plan-banner"></div>

    <label>Clé d'activation <span style="color:#f87171">*</span></label>
    <input type="text" id="license-key" placeholder="Ta clé reçue après paiement" autocomplete="off"/>
    <div class="key-note">Reçue par email ou affichée après ton paiement</div>

    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com" autocomplete="email"/>

    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="Minimum 6 caractères" autocomplete="new-password"/>

    <label>Confirmer le mot de passe</label>
    <input type="password" id="password2" placeholder="Répète ton mot de passe"/>

    <div class="error" id="err"></div>
    <button id="btn" onclick="register()">Créer mon compte</button>
    <div class="footer-link">Déjà un compte ? <a href="/login.html">Se connecter</a> · <a href="/">Accueil</a></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const urlKey = params.get('key');
const urlPlan = params.get('plan');
const planColors = { starter: '#38bdf8', pro: '#6c63ff', premium: '#f59e0b' };
const planNames = { starter: 'Starter — 10€/mois', pro: 'Pro — 30€/mois', premium: 'Premium — 80€/mois' };

if (urlKey) {
  document.getElementById('license-key').value = urlKey;
}
if (urlPlan && planNames[urlPlan]) {
  const b = document.getElementById('plan-banner');
  b.style.display = 'block';
  b.style.background = `rgba(${urlPlan==='starter'?'56,189,248':urlPlan==='pro'?'108,99,255':'245,158,11'},.1)`;
  b.style.border = `1px solid rgba(${urlPlan==='starter'?'56,189,248':urlPlan==='pro'?'108,99,255':'245,158,11'},.25)`;
  b.style.color = planColors[urlPlan];
  b.textContent = '✓ Plan sélectionné : ' + planNames[urlPlan];
}
if (!urlKey && !urlPlan) {
  document.getElementById('no-key-msg').style.display = 'block';
}

async function register() {
  const key = document.getElementById('license-key').value.trim();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  const errEl = document.getElementById('err');
  const btn = document.getElementById('btn');
  errEl.textContent = '';

  if (!key) { errEl.textContent = 'Entre ta clé d\'activation.'; return; }
  if (!email) { errEl.textContent = 'Entre ton email.'; return; }
  if (pw.length < 6) { errEl.textContent = 'Mot de passe trop court (min 6 caractères).'; return; }
  if (pw !== pw2) { errEl.textContent = 'Les mots de passe ne correspondent pas.'; return; }

  btn.disabled = true;
  btn.textContent = 'Création en cours…';
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw, license_key: key })
    });
    const text = await r.text();
    let data;
    try { data = JSON.parse(text); } catch { data = { detail: text }; }
    if (!r.ok) { errEl.textContent = data.detail || 'Erreur inscription'; return; }
    localStorage.setItem('vbot_token', data.token);
    localStorage.setItem('vbot_user', JSON.stringify(data.user));
    window.location.href = '/app';
  } catch(e) {
    errEl.textContent = 'Erreur serveur : ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Créer mon compte';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>
